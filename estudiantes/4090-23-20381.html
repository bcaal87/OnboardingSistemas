<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Victor Juan de Dios Garcia Leonardo</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile-image {
            max-width: 200px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .profile-label {
            font-weight: bold;

        }

        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-button:hover {
            background-color: #005bb3;
        }

<body>
    <div class="profile-container">
        <h1>Victor Juan de Dios Garcia Leonardo</h1>

            <span class="profile-label">Carrera:</span>
            <p class="profile-info">Ingeniería en Sistemas</p>
        </div>
        
        <div class="profile-section">
            <span class="profile-label">Año de Estudios:</span>
            <p class="profile-info">4to año de la carrera</p>
        </div>
        
        <div class="profile-section">
            <span class="profile-label">Año Académico:</span>

        <div class="profile-section">

        <a href="../Index.html" class="back-button">← Volver al Índice</a>
